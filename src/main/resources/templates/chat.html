<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-time-chat Room</title>       <!-- This is a title present in the url -->
    <!-- This is bootstrap url to make use of it like adding buttons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script> <!-- when web socket cannot be used sockjs is used -->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>
</head>
<body>
<div class="container mt-4">
     <h1 class="text-center">Real-time chat application</h1>      <!-- This is a header -->
    <div id="chat"
         class="border rounded p-3 mb-3"
         style="height: 300px; overflow-y:auto;">

</div>
<div class="input-group mb-3">
     <input id="senderInput" type="text" class="form-control"
            placeholder="Your name..."/>
</div>
    <div class="input-group mb-3">
    <input id="messageInput" type="text" class="form-control"
           placeholder="Type a message..."/>
</div>
    <div class="input-group-append">
        <button id="sendMessage" class="btn btn-primary">send </button> <!-- add primary button-->

    </div>
</div>

</body>
<script> <!-- js code-->
    function setConnected (connected){
    document.getElementById('sendMessage').disabled =!connected; <!-- if not connected the send button is disabled-->
    }
    var stompClient = null;       <!--global variable-->
    function connect(){
    var socket = new SockJS('/chat');   <!-- object for sock js-->
    stompClient=StompJs.Stomp.over(socket);
    stompClient.connect({}, function(frame){
                setConnected(true);
                stompClient.subscribe('/topics/messages', function(message){
                console.log("RECEIVED:", message.body);
                showMessage(JSON.parse(message.body));
                });
                });
    }
    function showMessage (message) {
    var chat=document.getElementById('chat');
    var messageElement=document.createElement('div');
    var time = new Date().toLocaleTimeString();
    messageElement.textContent=message.sender +': '+ message.content + " (" + time + ")";
    messageElement.style.padding = "5px";
    messageElement.style.marginBottom = "5px";
    messageElement.style.borderBottom = "1px solid #ccc";
    chat.appendChild(messageElement);
    chat.scrollTop=chat.scrollHeight;        <!-- used to scroll chat in case of longer convo-->

}
    function sendMessage(){
    var sender=document.getElementById('senderInput').value;
    var content=document.getElementById('messageInput').value;
    var chatMessage={         <!-- backend(server) communication-->
    sender:sender,
    content:content
    }
    stompClient.send("/app/sendMessage",{},JSON.stringify(chatMessage));
    document.getElementById('messageInput').value='';
    }
    document.getElementById('sendMessage').onclick=sendMessage;
    window.onload=connect;
</script>
</html>
